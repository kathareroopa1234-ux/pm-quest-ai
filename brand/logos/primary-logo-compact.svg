<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none" role="img" aria-label="PM Quest AI compact logo for mobile navigation">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&amp;display=swap');
      .wordmark { font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif; font-weight: 700; }
    </style>
    <linearGradient id="plc-gradient" x1="4" y1="40" x2="40" y2="4" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="52%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="plc-ai" x1="0" y1="0" x2="36" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- 40px monogram for mobile nav bars -->
  <rect x="4" y="4" width="40" height="40" rx="10" fill="#0F0F23"/>
  <circle cx="24" cy="26" r="9" stroke="url(#plc-gradient)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M31 33 L37 27 L33 27 L33 21" stroke="url(#plc-gradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="18" cy="14" r="1.5" fill="#00D4FF"/>
  <circle cx="24" cy="12" r="1.5" fill="#818CF8"/>
  <circle cx="30" cy="14" r="1.5" fill="#A855F7"/>
  <text class="wordmark" x="56" y="30" font-size="18" fill="#0F0F23" letter-spacing="-0.02em">PM Quest</text>
  <rect x="158" y="14" width="36" height="20" rx="6" fill="url(#plc-ai)"/>
  <text class="wordmark" x="176" y="28" font-size="10" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.06em">AI</text>
</svg>
